# Market Regime Router 기반 자동/수동 매매 정책 설정.
#
# REAL 주문은 기본 비활성화. config.yaml의 safety.enable_real_trading +
# trading_mode.real_trading_enabled + user_confirmed_real_risk 가 모두
# true일 때만 REAL 주문이 가능하다 (그 외에는 무조건 PAPER).

trading_mode:
  order_mode: "PAPER"              # PAPER | REAL
  entry_mode: "MANUAL_APPROVAL"    # AUTO | MANUAL_APPROVAL
  exit_mode: "AUTO"                # 항상 AUTO 권장 (수동 청산 UI는 참고용)
  force_auto_exit: true            # 수동매수라도 자동매도 (position_guard 강제 적용)
  allow_inverse: false
  max_positions: 3
  max_daily_trades: 3
  max_daily_loss_pct: -2.0
  stop_after_consecutive_losses: 2

  # ── REAL 주문 3중 안전장치 (모두 true여야 REAL 주문 가능) ────────────
  real_trading_enabled: false
  user_confirmed_real_risk: false

  # ── 정책 선택 제약 (policy_selector.py) ──────────────────────────────
  confidence_threshold: 60
  risk_off_hard_limit: 75          # market_risk_score(risk_off_score) 초과 시 인버스만 허용
  entry_cutoff_time: "09:45"

# ── 자동매도 임계값 (position_guard.py) ────────────────────────────────
exit_rules:
  take_profit1_pct: 2.0            # +2.0% 도달 시 50% 익절
  take_profit2_pct: 3.0            # +3.0% 도달 시 전량 익절
  stop_loss_pct: -1.2              # -1.2% 도달 시 전량 손절
  force_exit_time: "11:10"         # 전량 시간청산
  vwap_breakdown_enabled: true
  regime_deteriorate_check: true   # 시장유형 D/E 악화 시 보유종목 재평가

# ── 주문 재시도/안전 처리 (order_executor.py) ──────────────────────────
order_retry:
  max_retries: 2                   # 1차 재시도 + 2차 재시도
  retry_backoff_seconds: 0.5
  verify_real_order: true          # REAL 모드에서 주문결과 확인 로그 필수

# ── 현재가 감시 (price_watcher.py) ──────────────────────────────────────
price_watch:
  poll_interval_seconds: 2
  stale_after_seconds: 30
  failure_block_threshold: 5       # 연속 실패 이 횟수 이상이면 신규매수 금지

# ── C유형 GAP 보조 정책 세부 설정 ───────────────────────────────────────
policy_gap_support_cfg:
  max_candidates: 5
  already_risen_limit_pct: 15.0
  open_hold_min_rate: -1.5

# ── E유형 인버스 정책 세부 설정 ─────────────────────────────────────────
policy_inverse:
  new_entry_cutoff_time: "09:40"
  stop_loss_pct: -1.5
  take_profit_pct: 3.0
